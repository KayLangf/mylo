<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mylo — NC FNS Eligibility Assistant</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f6f8;
    --panel: #ffffff;
    --text: #1a1d23;
    --muted: #6b7280;
    --border: #e2e4e9;
    --accent: #2f5d50;
    --accent-text: #ffffff;
    --user-bubble: #2f5d50;
    --agent-bubble: #eef0f3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a;
      --panel: #1c1f26;
      --text: #e8e9ec;
      --muted: #9aa0ab;
      --border: #2b2f38;
      --accent: #4f9c86;
      --accent-text: #0c1210;
      --user-bubble: #4f9c86;
      --agent-bubble: #262a33;
    }
  }
  * { box-sizing: border-box; }
  /* #gate and .app both set their own `display`, which otherwise beats
     the `hidden` attribute's user-agent-stylesheet `display: none` (author
     rules win over user-agent rules at equal specificity) — this makes
     `hidden` authoritative regardless of what else targets these elements. */
  [hidden] { display: none !important; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .app {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 1.05rem;
    margin: 0;
  }
  header p {
    margin: 0.15rem 0 0;
    font-size: 0.8rem;
    color: var(--muted);
  }
  #export-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 0.4rem 0.7rem;
    font-size: 0.8rem;
    cursor: pointer;
  }
  #export-btn:hover { background: var(--agent-bubble); }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .bubble {
    max-width: 82%;
    padding: 0.65rem 0.9rem;
    border-radius: 14px;
    line-height: 1.45;
    font-size: 0.92rem;
    white-space: pre-wrap;
  }
  .bubble.user {
    align-self: flex-end;
    background: var(--user-bubble);
    color: var(--accent-text);
    border-bottom-right-radius: 4px;
  }
  .bubble.agent {
    align-self: flex-start;
    background: var(--agent-bubble);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .bubble.pending { padding: 0.8rem 1rem; }
  .typing-dots {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .typing-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: typing-bounce 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    .typing-dots span { animation: none; opacity: 0.7; }
  }
  form {
    display: flex;
    gap: 0.6rem;
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.75rem;
    font-size: 0.92rem;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    max-height: 8rem;
  }
  textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button[type="submit"] {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 10px;
    padding: 0 1.1rem;
    font-size: 0.9rem;
    cursor: pointer;
  }
  button[type="submit"]:disabled { opacity: 0.5; cursor: default; }
  .char-count {
    font-size: 0.72rem;
    color: var(--muted);
    padding: 0 1.25rem 0.6rem;
    text-align: right;
  }
  .char-count.over { color: #c0392b; }
  .disclaimer {
    font-size: 0.72rem;
    color: var(--muted);
    padding: 0 1.25rem 0.6rem;
  }
  #gate {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.25rem;
    z-index: 10;
  }
  #gate-box {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  #gate-box h1 { font-size: 1.05rem; margin: 0 0 0.2rem; }
  #gate-box p { font-size: 0.82rem; color: var(--muted); margin: 0 0 0.4rem; }
  #gate-box input {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.75rem;
    font-size: 0.92rem;
    background: var(--panel);
    color: var(--text);
  }
  #gate-box input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  #gate-box button {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 10px;
    padding: 0.6rem;
    font-size: 0.9rem;
    cursor: pointer;
  }
  #gate-error {
    font-size: 0.8rem;
    color: #c0392b;
    min-height: 1.1em;
  }
</style>
</head>
<body>
<div id="gate">
  <form id="gate-box">
    <h1>Mylo</h1>
    <p>This is a private demo deployment — enter the access password to continue.</p>
    <input id="gate-password" type="password" placeholder="Password" autofocus autocomplete="off">
    <button type="submit">Unlock</button>
    <div id="gate-error"></div>
  </form>
</div>
<div class="app" id="app-content" hidden>
  <header>
    <div>
      <h1>Mylo</h1>
      <p>NC FNS (SNAP) eligibility assistant — not a real application or determination</p>
    </div>
    <button id="export-btn" type="button">Export transcript</button>
  </header>
  <main id="log" aria-live="polite"></main>
  <div class="char-count" id="char-count"></div>
  <form id="form">
    <textarea id="input" rows="1" placeholder="Type a message…" autofocus></textarea>
    <button type="submit" id="send-btn">Send</button>
  </form>
  <div class="disclaimer">Mylo gives an informational screening estimate only. A caseworker determines actual eligibility.</div>
</div>

<script>
(function () {
  const gate = document.getElementById("gate");
  const gateBox = document.getElementById("gate-box");
  const gatePassword = document.getElementById("gate-password");
  const gateError = document.getElementById("gate-error");
  const appContent = document.getElementById("app-content");

  const log = document.getElementById("log");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  const charCount = document.getElementById("char-count");
  const exportBtn = document.getElementById("export-btn");

  // Session state lives only in this tab's memory and is resent with
  // every request — the API is stateless (see api/index.py). Nothing
  // here is shared across tabs or persisted, matching SPEC.md's
  // single-session-only, no-cross-session-leakage design.
  let session = { session_id: null, history: [], facts: {} };
  let maxInputChars = 2000;

  // The access password gates every paid API route (see
  // api/index.py's require_password dependency) so the deployed URL
  // can't be used by strangers to run up API costs. Kept only in
  // sessionStorage (cleared when the tab closes), never localStorage —
  // this is a shared-password demo gate, not a real auth system, so it
  // deliberately doesn't try to persist a "login" long-term.
  let accessPassword = sessionStorage.getItem("mylo_pw") || "";

  function authHeaders(extra) {
    return Object.assign({ "X-Mylo-Password": accessPassword }, extra || {});
  }

  function showGate(message) {
    appContent.hidden = true;
    gate.hidden = false;
    gateError.textContent = message || "";
    gatePassword.focus();
  }

  function showApp() {
    gate.hidden = true;
    appContent.hidden = false;
  }

  async function unlock(password) {
    let res;
    try {
      res = await fetch("/api/greeting", { headers: authHeaders({ "X-Mylo-Password": password }) });
    } catch (err) {
      showGate("Couldn't reach the server just now — try again.");
      return;
    }
    if (!res.ok) {
      sessionStorage.removeItem("mylo_pw");
      accessPassword = "";
      showGate(res.status === 401 ? "Incorrect password." : "Something went wrong — try again.");
      return;
    }
    accessPassword = password;
    sessionStorage.setItem("mylo_pw", password);
    const data = await res.json();
    maxInputChars = data.max_input_chars || maxInputChars;
    showApp();
    if (!log.hasChildNodes()) {
      addBubble("agent", data.greeting, false);
      updateCharCount();
    }
  }

  gateBox.addEventListener("submit", (e) => {
    e.preventDefault();
    const password = gatePassword.value;
    if (!password) return;
    unlock(password);
  });

  function addBubble(role, text, pending) {
    const el = document.createElement("div");
    el.className = "bubble " + role + (pending ? " pending" : "");
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  function addTypingBubble() {
    const el = document.createElement("div");
    el.className = "bubble agent pending";
    const dots = document.createElement("span");
    dots.className = "typing-dots";
    dots.setAttribute("aria-label", "Mylo is typing");
    for (let i = 0; i < 3; i++) dots.appendChild(document.createElement("span"));
    el.appendChild(dots);
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  function updateCharCount() {
    const len = input.value.length;
    charCount.textContent = len > 0 ? len + " / " + maxInputChars : "";
    charCount.classList.toggle("over", len > maxInputChars);
  }

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 128) + "px";
    updateCharCount();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    addBubble("user", message, false);
    input.value = "";
    input.style.height = "auto";
    updateCharCount();
    sendBtn.disabled = true;
    const pendingBubble = addTypingBubble();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({ message: message, session: session }),
      });
      if (res.status === 401) {
        pendingBubble.remove();
        showGate("Your session's password expired or changed — please re-enter it.");
        return;
      }
      if (!res.ok) throw new Error("Request failed: " + res.status);
      const data = await res.json();
      session = data.session;
      pendingBubble.textContent = data.reply;
      pendingBubble.classList.remove("pending");
    } catch (err) {
      pendingBubble.textContent = "Something went wrong reaching Mylo — please try again.";
      pendingBubble.classList.remove("pending");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });

  exportBtn.addEventListener("click", async () => {
    try {
      const res = await fetch("/api/export", {
        method: "POST",
        headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify(session),
      });
      if (res.status === 401) {
        showGate("Your session's password expired or changed — please re-enter it.");
        return;
      }
      const data = await res.json();
      const blob = new Blob([data.transcript], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "mylo_transcript_" + (session.session_id || "session") + ".txt";
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      alert("Couldn't export the transcript right now.");
    }
  });

  if (accessPassword) {
    unlock(accessPassword);
  } else {
    showGate();
  }
})();
</script>
</body>
</html>
